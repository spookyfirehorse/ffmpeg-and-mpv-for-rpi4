<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 220px; font-family: sans-serif; padding: 12px; background: #fdfdfd; color: #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; margin-top: 10px; }
        .label { color: #777; }
        .val { font-weight: bold; text-align: right; color: #222; }
        .title { font-size: 14px; font-weight: bold; border-bottom: 2px solid #4CAF50; padding-bottom: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="title">🛰️ GPS Live Status</div>
    <div id="no-data" style="font-size: 11px; color: #F44336;">Warte auf Daten...</div>
    <div class="grid" id="gps-grid" style="display:none;">
        <span class="label">Lat:</span> <span id="lat" class="val">-</span>
        <span class="label">Lng:</span> <span id="lng" class="val">-</span>
        <span class="label">Höhe:</span> <span id="alt" class="val">-</span>
        <span class="label">Kurs:</span> <span id="head" class="val">-</span>
        <span class="label">Speed:</span> <span id="speed" class="val">-</span>
    </div>
    <script src="popup.js"></script>
</body>
</html>
