<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 200px; font-family: sans-serif; padding: 12px; margin: 0; background: #f9f9f9; }
    h3 { margin: 0 0 10px; font-size: 14px; color: #333; }
    .status-box { background: white; border: 1px solid #ddd; padding: 8px; border-radius: 4px; }
    .coords { font-family: monospace; font-size: 12px; margin: 5px 0; color: #555; }
    .label { font-weight: bold; color: #333; }
    button {
      width: 100%; margin-top: 10px; padding: 8px;
      background: #4CAF50; color: white; border: none;
      border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    button:hover { background: #45a049; }
  </style>
</head>
<body>
  <h3>GPSD Status</h3>
  <div class="status-box">
    <div class="coords"><span class="label">Lat:</span> <span id="lat">Warten...</span></div>
    <div class="coords"><span class="label">Lng:</span> <span id="lng">Warten...</span></div>
  </div>
  <button id="refresh">Sync Neustarten</button>

  <!-- WICHTIG: Kein Inline-Code, nur externe Datei! -->
  <script src="popup.js"></script>
</body>
</html>
